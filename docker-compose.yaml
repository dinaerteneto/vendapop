services:
  mailhog:
    image: axllent/mailpit:latest
    container_name: vendapop-mailhog
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    networks:
      - vendapop-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: moda-backend
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: moda_whatsapp_saas
      DB_USERNAME: moda_user
      DB_PASSWORD: moda_pass
      MAIL_MAILER: smtp
      MAIL_HOST: mailhog
      MAIL_PORT: 1025
      MAIL_USERNAME: null
      MAIL_PASSWORD: null
      MAIL_ENCRYPTION: null
      MAIL_FROM_ADDRESS: "noreply@vendapop.com"
      MAIL_FROM_NAME: "VendaPop"
      FRONTEND_URL: "http://localhost:5173"
    volumes:
      - ./backend:/var/www/html
      - /var/www/html/vendor
    depends_on:
      - db
      - mailhog
    networks:
      - vendapop-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: moda-frontend
    ports:
      - "5173:5173"
    environment:
      # URL da API vista DE FORA (browser)
      VITE_API_BASE_URL: "http://localhost:8000/api"
      # VAPID Public Key para Push Notifications (mesma chave do backend)
      VITE_VAPID_PUBLIC_KEY: "BCbbdLAieX1EI8ivn5jYk1qdFgQrRhcSKzL59cQpEXUyN4OaWq7I6AR9OOYVliqR1Rp3RyEpJtWvUNJXJGJvzW8"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - vendapop-network

  db:
    image: mysql:8.0
    container_name: moda-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: moda_whatsapp_saas
      MYSQL_USER: moda_user
      MYSQL_PASSWORD: moda_pass
    ports:
      - "3307:3306"
    volumes:
      - moda_db_data:/var/lib/mysql
    networks:
      - vendapop-network

networks:
  vendapop-network:
    driver: bridge

volumes:
  moda_db_data:
