name: vestezap

services:
  frontend:
    build:
      context: ../frontend
      dockerfile: ../deploy/Dockerfile.frontend
      args:
        - VITE_API_BASE_URL=https://${DOMAIN}/api
    restart: unless-stopped
    volumes:
      - ./nginx/frontend.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      vestezap-prod: {}
      web:
        aliases:
          - vestezap-frontend

  backend-nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - backend_storage:/var/www/html/storage:ro
      - ./nginx/backend.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_started
    networks:
      vestezap-prod: {}
      web:
        aliases:
          - vestezap-api

  backend:
    build:
      context: ../backend
      dockerfile: ../deploy/Dockerfile.backend
      target: fpm
    restart: unless-stopped
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_KEY=${APP_KEY:?APP_KEY is required}
      - APP_URL=https://${DOMAIN}
      - FRONTEND_URL=https://${DOMAIN}
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-vestezap}
      - DB_USERNAME=${DB_USERNAME:-vestezap}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - SESSION_DRIVER=database
      - SESSION_DOMAIN=${DOMAIN}
      - SESSION_SECURE_COOKIE=true
      - CACHE_STORE=database
      - QUEUE_CONNECTION=database
      - MAIL_MAILER=${MAIL_MAILER:-smtp}
      - MAIL_HOST=${MAIL_HOST:-}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME:-}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}
      - MAIL_ENCRYPTION=${MAIL_ENCRYPTION:-tls}
      - MAIL_FROM_ADDRESS=${MAIL_FROM_ADDRESS:-noreply@${DOMAIN}}
      - MAIL_FROM_NAME=VesteZap
      - LOG_LEVEL=${LOG_LEVEL:-notice}
    volumes:
      - backend_storage:/var/www/html/storage
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - vestezap-prod

  queue-worker:
    build:
      context: ../backend
      dockerfile: ../deploy/Dockerfile.backend
      target: worker
    restart: unless-stopped
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_KEY=${APP_KEY:?APP_KEY is required}
      - APP_URL=https://${DOMAIN}
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-vestezap}
      - DB_USERNAME=${DB_USERNAME:-vestezap}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - QUEUE_CONNECTION=database
      - CACHE_STORE=database
      - MAIL_MAILER=${MAIL_MAILER:-smtp}
      - MAIL_HOST=${MAIL_HOST:-}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME:-}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}
      - MAIL_ENCRYPTION=${MAIL_ENCRYPTION:-tls}
      - MAIL_FROM_ADDRESS=${MAIL_FROM_ADDRESS:-noreply@${DOMAIN}}
      - MAIL_FROM_NAME=VesteZap
    volumes:
      - backend_storage:/var/www/html/storage
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - vestezap-prod

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD is required}
      - MYSQL_DATABASE=${DB_DATABASE:-vestezap}
      - MYSQL_USER=${DB_USERNAME:-vestezap}
      - MYSQL_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vestezap-prod

  backup:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      - DB_NAME=${DB_DATABASE:-vestezap}
      - DB_USER=root
      - DB_PASSWORD=${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD is required}
    volumes:
      - backup_data:/backups
    entrypoint:
      - sh
      - -c
      - |
        while true; do
          ts=$$(date +%Y%m%d-%H%M%S)
          mysqldump -h mysql -u root -p"$$DB_PASSWORD" "$$DB_NAME" > /backups/vestezap-$$ts.sql 2>/dev/null \
            && echo "backup ok: $$ts" || echo "backup FAILED: $$ts"
          find /backups -name '*.sql' -mtime +30 -delete
          sleep 86400
        done
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - vestezap-prod

volumes:
  backend_storage:
  mysql_data:
  backup_data:

networks:
  vestezap-prod:
    driver: bridge
  web:
    external: true
